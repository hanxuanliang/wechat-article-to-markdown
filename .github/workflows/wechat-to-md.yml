name: WeChat Article to Markdown

on:
  issues:
    types: [opened, edited]

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node action.js
